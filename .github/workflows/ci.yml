name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ==========================================================================
  # Primary test matrix — Linux/macOS/Windows on x64 and arm64, plus MSRV.
  # ==========================================================================
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
          - name: Linux aarch64
            os: ubuntu-24.04-arm
          - name: macOS arm64
            os: macos-latest
          - name: macOS x64
            os: macos-26-intel
          - name: Windows x64
            os: windows-latest
          - name: Windows arm64
            os: windows-11-arm
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test (default features)
        run: cargo test --all-targets

      - name: Doc tests
        run: cargo test --doc

  # ==========================================================================
  # MSRV — confirm the crate still builds on its declared rust-version.
  # ==========================================================================
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.89

      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build
        run: cargo build --all-targets

  # ==========================================================================
  # Cross-compiled 32-bit testing (i686 via QEMU) — pointer-width / WASM-adjacent
  # correctness.
  # ==========================================================================
  i686:
    name: Test i686
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - uses: taiki-e/install-action@cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Test (i686/QEMU)
        run: cross test --target i686-unknown-linux-gnu

  # ==========================================================================
  # C-reference feature — exercises the optional cc-built shim on a host that
  # ships a C compiler.
  # ==========================================================================
  c-reference:
    name: C-reference feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test (c-reference)
        run: cargo test --features c-reference

  # ==========================================================================
  # Lint — formatting + clippy.
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ==========================================================================
  # Docs — rustdoc must build clean (no broken intra-doc links).
  # ==========================================================================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # ==========================================================================
  # Coverage — best-effort upload to Codecov.
  # ==========================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
